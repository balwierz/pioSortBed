name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.runner }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "default (BED-only)"
            runner: ubuntu-latest
            flags: ""
            apt_extra: ""
            needs_arrow: false
          - name: "WITH_HTSLIB (+ --bgzip / --tabix)"
            runner: ubuntu-latest
            flags: "WITH_HTSLIB=1"
            apt_extra: "libhts-dev tabix"
            needs_arrow: false
          - name: "WITH_HTSLIB + WITH_LOCISS (+ --lociss-output)"
            # ubuntu-22.04 (jammy), not ubuntu-latest (24.04 noble) —
            # Apache Arrow's noble package depends on libcurl4-openssl-dev,
            # which noble replaced with libcurl4t64-openssl-dev (the
            # 64-bit-time_t transition). Pinning to jammy sidesteps the
            # dependency mismatch until upstream Arrow ships a noble-
            # compatible package.
            runner: ubuntu-22.04
            flags: "WITH_HTSLIB=1 WITH_LOCISS=1"
            # libarrow-dev / libparquet-dev come from the Apache Arrow APT
            # source. python3-pyarrow isn't a Debian package; install via pip
            # (test/test.sh uses pyarrow for the cross-path data-payload
            # md5 check).
            apt_extra: "libhts-dev tabix libarrow-dev libparquet-dev python3-pip"
            needs_arrow: true

    steps:
      - uses: actions/checkout@v4

      - name: Add Apache Arrow APT repo
        if: ${{ matrix.config.needs_arrow }}
        # Ubuntu noble doesn't ship libarrow-dev/libparquet-dev/python3-pyarrow
        # in its default repos; the Apache Arrow project distributes them via
        # their own APT source. https://arrow.apache.org/install/
        run: |
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget
          codename=$(lsb_release --codename --short)
          wget -q https://apache.jfrog.io/artifactory/arrow/ubuntu/apache-arrow-apt-source-latest-${codename}.deb
          sudo apt-get install -y -V ./apache-arrow-apt-source-latest-${codename}.deb
          rm apache-arrow-apt-source-latest-${codename}.deb

      - name: Install build + test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y -V \
            g++ make \
            libtbb-dev liblz4-dev libzstd-dev \
            ${{ matrix.config.apt_extra }}

      - name: Install pyarrow for the LociSSD test guard
        if: ${{ matrix.config.needs_arrow }}
        # test/test.sh's cross-path data-payload md5 check uses pyarrow
        # to skip the manifest's created_utc timestamp when comparing
        # files. Install via pip with --break-system-packages because
        # Ubuntu noble's system Python is externally-managed (PEP 668).
        run: |
          python3 -m pip install --break-system-packages 'pyarrow~=21.0' || \
          python3 -m pip install --break-system-packages pyarrow

      - name: Build (${{ matrix.config.flags || 'default' }})
        run: make ${{ matrix.config.flags }} pioSortBed

      - name: Sanity-check binary
        run: |
          ./pioSortBed --version
          ./pioSortBed --help | head -20

      - name: Run test suite
        run: make ${{ matrix.config.flags }} test
