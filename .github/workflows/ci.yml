name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest
    container: ${{ matrix.config.container }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "default (BED-only)"
            container: ""
            flags: ""
            apt_extra: ""
            needs_arrow: false
            build_htslib: false
          - name: "WITH_HTSLIB (+ --bgzip / --tabix)"
            container: ""
            flags: "WITH_HTSLIB=1"
            apt_extra: "libhts-dev tabix"
            needs_arrow: false
            build_htslib: false
          - name: "WITH_HTSLIB + WITH_LOCISS (+ --lociss-output)"
            # Run in a clean ubuntu:22.04 container, not on the
            # ubuntu-latest runner, to keep apt's view of the world
            # reproducible. Two complications drove this layout:
            #   (1) Apache Arrow's libarrow-dev depends on
            #       libcurl4-openssl-dev; the noble runner replaced
            #       that with libcurl4t64-openssl-dev (64-bit-time_t
            #       transition) and the ubuntu-22.04 runner image has
            #       pre-installed packages that block it too.
            #   (2) Debian's libhts-dev depends on libcurl4-gnutls-dev,
            #       which mutually excludes libcurl4-openssl-dev — so
            #       libarrow-dev and libhts-dev cannot coexist as APT
            #       packages on the same machine. We build htslib from
            #       source instead (the Makefile already supports
            #       HTSLIB=/path/to/htslib for exactly this case) and
            #       install libarrow-dev / libparquet-dev as packages.
            container: "ubuntu:22.04"
            flags: "WITH_HTSLIB=1 WITH_LOCISS=1 HTSLIB=${{ github.workspace }}/htslib"
            # libarrow-dev / libparquet-dev come from the Apache Arrow APT
            # source. python3-pyarrow isn't a Debian package; install via pip
            # (test/test.sh uses pyarrow for the cross-path data-payload
            # md5 check). tabix is the only deb that still pulls in libhts —
            # it brings libhts3 (runtime, not -dev) and libcurl4-gnutls is
            # a transitive runtime dep with no conflict against
            # libcurl4-openssl-dev. sudo isn't present in the bare
            # container — steps run as root.
            apt_extra: "tabix libarrow-dev libparquet-dev python3-pip
              libdeflate-dev"
            needs_arrow: true
            build_htslib: true

    steps:
      - name: Install git + ca-certificates (container only)
        if: ${{ matrix.config.container != '' }}
        # actions/checkout needs git inside the container; the
        # bare ubuntu:22.04 image doesn't ship it. ca-certificates
        # is needed for the Apache Arrow apt source download.
        run: |
          apt-get update
          apt-get install -y -V git ca-certificates

      - uses: actions/checkout@v4

      - name: Add Apache Arrow APT repo
        if: ${{ matrix.config.needs_arrow }}
        # Ubuntu noble doesn't ship libarrow-dev/libparquet-dev/python3-pyarrow
        # in its default repos; the Apache Arrow project distributes them via
        # their own APT source. https://arrow.apache.org/install/
        run: |
          apt-get update
          apt-get install -y -V ca-certificates lsb-release wget
          codename=$(lsb_release --codename --short)
          wget -q https://apache.jfrog.io/artifactory/arrow/ubuntu/apache-arrow-apt-source-latest-${codename}.deb
          apt-get install -y -V ./apache-arrow-apt-source-latest-${codename}.deb
          rm apache-arrow-apt-source-latest-${codename}.deb

      - name: Install build + test dependencies
        run: |
          ${{ matrix.config.container == '' && 'sudo' || '' }} apt-get update
          ${{ matrix.config.container == '' && 'sudo' || '' }} apt-get install -y -V \
            g++ make \
            libtbb-dev liblz4-dev libzstd-dev \
            ${{ matrix.config.apt_extra }}

      - name: Install pyarrow for the LociSSD test guard
        if: ${{ matrix.config.needs_arrow }}
        # test/test.sh's cross-path data-payload md5 check uses pyarrow
        # to skip the manifest's created_utc timestamp when comparing
        # files. Jammy's system pip (22.0.2) doesn't have PEP 668
        # enforcement, so plain pip install works. Jammy also predates
        # --break-system-packages (added in pip 23.0.1), so we cannot
        # use it here.
        run: |
          python3 -m pip install pyarrow

      - name: Build htslib from source (LociSSD job only)
        if: ${{ matrix.config.build_htslib }}
        # The Debian libhts-dev pulls in libcurl4-gnutls-dev, which
        # mutually excludes libarrow-dev's libcurl4-openssl-dev. Build
        # htslib ourselves to dodge the conflict; the Makefile picks it
        # up via HTSLIB=… (see the matrix flags entry). autoconf et al
        # are needed because the release tarball's ./configure is
        # already-generated but the git tag isn't — we ship the source
        # tree via git so we get htscodecs/ as a submodule.
        run: |
          apt-get install -y -V autoconf automake libtool git
          git clone --depth=1 --branch=1.21 https://github.com/samtools/htslib.git
          cd htslib
          git submodule update --init --depth=1
          autoreconf -i
          # --disable-bz2 / --disable-lzma match the Makefile's HTSLIB=…
          # link line, which only adds -ldeflate (not -lbz2 / -llzma).
          ./configure --disable-libcurl --disable-s3 --disable-gcs \
                      --disable-plugins --disable-bz2 --disable-lzma
          make -j"$(nproc)"

      - name: Build (${{ matrix.config.flags || 'default' }})
        run: make ${{ matrix.config.flags }} pioSortBed

      - name: Sanity-check binary
        run: |
          ./pioSortBed --version
          ./pioSortBed --help | head -20

      - name: Run test suite
        run: make ${{ matrix.config.flags }} test
